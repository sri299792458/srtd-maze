seed: 0
method: sr_tmin
run_root: runs

dataset:
  name: maze2d_fallback_smoke
  maze_yaml: assets/maze2d_default.yaml
  fallback_generate: true
  num_clean_episodes: 4
  num_rrt_episodes: 12
  episode_horizon: 60
  policy_horizon: 16
  execute_horizon: 8
  obs_horizon: 2
  stride: 8

model:
  type: temporal_unet
  action_dim: 2
  obs_dim: 6
  base_channels: 32
  num_layers: 4
  dropout: 0.0
  predict: x0

diffusion:
  type: vp
  schedule: cosine
  train_steps: 32
  inference_steps: 5

training:
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 1.0e-6
  total_steps: 5
  grad_clip_norm: 1.0
  ema_decay: 0.99
  log_every: 1
  alpha_p: 0.25
  tmin_sigma_scalar: 0.074
  device: auto

spectral:
  eps: 1.0e-6
  basis: rfft
  envelope_kernel_size: 3
  snr_tau: 1.0
  visibility_temperature: 0.5
  min_visible_weight: 0.02
  bad_residual_margin: 0.0
  global_band_cutoff_norm: 0.20
  compat_temperature: 0.25
  low_freq_floor: 0.25
  beta_clean_saliency: 0.25
  saliency_clip: 5.0
  lambda_p_freq: 0.1
  q_loss_weight: 1.0
  source_loss_weighting: sample

eval:
  num_trials: 8
  same_start_goal_across_policies: true
  success_radius_m: 0.15
  timeout_s: 5.0
  dt: 0.1

